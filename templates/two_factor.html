{% extends 'base.html' %}
{% block title %}İkili doğrulama — {{ site_name }}{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">🔐</div>
    <h1>İkili Doğrulama</h1>
    <p class="auth-sub">Authenticator tətbiqindəki 6 rəqəmli kodu — və ya telefonunuz yoxdursa bərpa kodlarından birini — daxil edin</p>

    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label><i class="fas fa-shield-halved"></i> Təsdiq kodu</label>
        <input type="text" name="code" maxlength="20"
               placeholder="6 rəqəmli kod və ya bərpa kodu" required autofocus autocomplete="one-time-code"
               style="text-align:center;font-size:20px;letter-spacing:4px">
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        <i class="fas fa-unlock"></i> Təsdiqlə
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('logout') }}">İmtina et</a>
    </div>
  </div>
</div>
{% endblock %}
