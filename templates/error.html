{% extends 'base.html' %}
{% block title %}Xəta {{ code }} — {{ site_name }}{% endblock %}
{% block content %}
<div class="container page-content">
  <div class="error-page">
    <div class="error-code">{{ code }}</div>
    <h1>{{ msg }}</h1>
    <p>Üzr istəyirik, bir problem yarandı.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Ana Səhifəyə Qayıt</a>
  </div>
</div>
{% endblock %}
