{% extends 'base.html' %}
{% block title %}Şifrəni sıfırla — {{ site_name }}{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">🔑</div>
    <h1>Yeni Şifrə</h1>
    <p class="auth-sub"><strong>{{ phone }}</strong> nömrəsinə göndərilən kodu və yeni şifrəni daxil edin</p>

    {% if dev_code %}
    <div class="flash flash-info" style="margin:0 0 16px">
      <span>🔧 Test rejimi — kodunuz: <strong style="letter-spacing:3px">{{ dev_code }}</strong></span>
    </div>
    {% endif %}

    <form method="post" class="auth-form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label><i class="fas fa-shield-alt"></i> Təsdiq kodu</label>
        <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
               placeholder="••••••" required style="text-align:center;font-size:22px;letter-spacing:6px">
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Yeni şifrə</label>
        <input type="password" name="password" placeholder="Ən az 6 simvol" required minlength="6">
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Yeni şifrəni təsdiqlə</label>
        <input type="password" name="confirm" placeholder="Şifrəni yenidən daxil edin" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">
        <i class="fas fa-check"></i> Şifrəni yenilə
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('forgot_password') }}">Kodu yenidən al</a>
    </div>
  </div>
</div>
{% endblock %}
