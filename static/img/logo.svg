<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="HeyvanBazar">
  <defs>
    <linearGradient id="hbBadge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#1a472a"/>
    </linearGradient>
    <linearGradient id="hbHorn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5c400"/>
      <stop offset="1" stop-color="#c49a00"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <circle cx="32" cy="32" r="30" fill="url(#hbBadge)" stroke="#e6b800" stroke-width="2.5"/>

  <!-- horns -->
  <path d="M21 23 C14 21 9 16 7 10 C12 12 16 13 20 15 C22 16 23 19 24 22 Z" fill="url(#hbHorn)"/>
  <path d="M43 23 C50 21 55 16 57 10 C52 12 48 13 44 15 C42 16 41 19 40 22 Z" fill="url(#hbHorn)"/>

  <!-- ears -->
  <ellipse cx="18" cy="30" rx="6" ry="4.2" fill="#e9e2cf" transform="rotate(-18 18 30)"/>
  <ellipse cx="46" cy="30" rx="6" ry="4.2" fill="#e9e2cf" transform="rotate(18 46 30)"/>

  <!-- face -->
  <path d="M32 17 C39 17 44 21 44 28 C44 33 42 36 40 40 C38 45 36 49 32 49 C28 49 26 45 24 40 C22 36 20 33 20 28 C20 21 25 17 32 17 Z" fill="#f5f0e1"/>

  <!-- eyes -->
  <circle cx="27" cy="29" r="2.4" fill="#1a472a"/>
  <circle cx="37" cy="29" r="2.4" fill="#1a472a"/>

  <!-- muzzle -->
  <path d="M25 38 C25 35 29 34 32 34 C35 34 39 35 39 38 C39 43 36 46 32 46 C28 46 25 43 25 38 Z" fill="#d9b38c"/>
  <ellipse cx="29" cy="40" rx="1.5" ry="1.9" fill="#7a5230"/>
  <ellipse cx="35" cy="40" rx="1.5" ry="1.9" fill="#7a5230"/>
</svg>
